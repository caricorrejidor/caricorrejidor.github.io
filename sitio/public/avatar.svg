<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Mascota robot de Carina">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="88%">
      <stop offset="0" stop-color="#7A5DB8"/>
      <stop offset="1" stop-color="#574294"/>
    </radialGradient>
  </defs>

  <!-- Fondo radial (centro más claro, como la referencia) -->
  <rect width="240" height="240" fill="url(#bg)"/>

  <!-- Antena -->
  <line x1="120" y1="70" x2="120" y2="48" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <circle cx="120" cy="40" r="10" fill="#FFFFFF"/>

  <!-- Orejas / laterales -->
  <rect x="48" y="108" width="18" height="40" rx="9" fill="#FFFFFF"/>
  <rect x="174" y="108" width="18" height="40" rx="9" fill="#FFFFFF"/>

  <!-- Cabeza (squircle redondeado) -->
  <rect x="64" y="68" width="112" height="100" rx="36" fill="#FFFFFF"/>

  <!-- Mejillas rosadas (el toque cálido que te gustó) -->
  <ellipse cx="84" cy="142" rx="11" ry="7" fill="#F3A8CB"/>
  <ellipse cx="156" cy="142" rx="11" ry="7" fill="#F3A8CB"/>

  <!-- Ojos grandes kawaii con brillo doble -->
  <ellipse cx="101" cy="116" rx="15" ry="18" fill="#3C2D66"/>
  <ellipse cx="139" cy="116" rx="15" ry="18" fill="#3C2D66"/>
  <circle cx="96" cy="110" r="6" fill="#FFFFFF"/>
  <circle cx="134" cy="110" r="6" fill="#FFFFFF"/>
  <circle cx="106" cy="123" r="3" fill="#FFFFFF"/>
  <circle cx="144" cy="123" r="3" fill="#FFFFFF"/>

  <!-- Sonrisa -->
  <path d="M111 134 Q120 143 129 134" fill="none" stroke="#3C2D66" stroke-width="5" stroke-linecap="round"/>
</svg>
